</label>
<label class="flex flex-col w-full">

<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</label>
<button class="h-12 w-full mt-2 bg-primary hover:bg-primary/90 text-white font-bold rounded-full transition-colors flex items-center justify-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>

<span>Google</span>
